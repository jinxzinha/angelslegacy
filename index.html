/* LOGIN */

radial-gradient(circle,#00364a,#050505 60%);

<script>

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtb2FkamZmanVwemFraW91ZG5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNTgyNzEsImV4cCI6MjA5NzgzNDI3MX0.krssVRf5OyRnuGLsQW0FUJl0vl_mQjteKSCSvM1VldE";

  SUPABASE_URL,
  SUPABASE_KEY
);

let usuarioAtual = null;
let config = {};
let paginaAtual = "angels";
let configCarregada = false;
let navegacaoToken = 0;
let categoriasLaterais = [];
const STORAGE_BUCKET = "anexos";


const NOMES_CATEGORIAS_PADRAO = {
  angels: "NEXTAGE",
  recrutamento: "RECRUTAMENTO",
  elite: "ELITE LEGACY",
  eventos: "EVENTOS",
  sorteio: "SORTEIO",
  virtus: "VIRTUS RP",
  logs: "LOGS",
  gerenciar: "GERENCIAR"
};

async function carregarCategorias(){
  try{
    const { data, error } = await db
      .from("categorias_laterais")
      .select("*")
      .eq("visivel", true)
      .order("ordem", { ascending: true });

    if(error) throw error;

    if(data && data.length){
      categoriasLaterais = data.map(c => ({
        chave: c.chave,
        nome: c.nome,
        sistema: !!c.sistema,
        ordem: c.ordem || 0
      }));
      return;
    }
  }catch(e){
    console.warn("Tabela categorias_laterais ainda não encontrada. Usando categorias padrão.", e);
  }

  categoriasLaterais = Object.entries(NOMES_CATEGORIAS_PADRAO).map(([chave, nome], i) => ({
    chave,
    nome,
    sistema: true,
    ordem: i + 1
  }));
}

function pegarNomesCategorias(){
  const nomes = { ...NOMES_CATEGORIAS_PADRAO };
  categoriasLaterais.forEach(cat => {
    nomes[cat.chave] = cat.nome;
  });
  return nomes;
}

function nomeCategoria(chave){
  const cat = categoriasLaterais.find(c => c.chave === chave);
  return cat ? cat.nome : (NOMES_CATEGORIAS_PADRAO[chave] || chave);
}

function normalizarChaveCategoria(nome){
  return "custom_" + String(nome || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_+|_+$/g, "");
}

function pegarCategoriasExtras(){
  return categoriasLaterais.filter(c => !c.sistema);
}

function podeGerenciarElite(){
  return usuarioAtual && (usuarioAtual.cargo === "admin" || usuarioAtual.cargo === "elite");
}

function apenasAdmin(){
  return usuarioAtual && usuarioAtual.cargo === "admin";
}

function confirmarExclusao(){
  return new Promise((resolve) => {
    const modal = document.getElementById("confirmModal");
    const yes = document.getElementById("confirmYesBtn");
    const no = document.getElementById("confirmNoBtn");

    if(!modal || !yes || !no){
      resolve(window.confirm("Tem certeza que deseja excluir?"));
      return;
    }

    const finalizar = (valor) => {
      modal.classList.add("hidden");
      yes.onclick = null;
      no.onclick = null;
      resolve(valor);
    };

    yes.onclick = () => finalizar(true);
    no.onclick = () => finalizar(false);
    modal.classList.remove("hidden");
  });
}

async function adicionarCategoriaLateral(){
  const nome = novaCategoriaNome.value.trim();

  if(!nome){
    alert("Digite o nome da nova categoria.");
    return;
  }

  const chave = normalizarChaveCategoria(nome);

  if(chave === "custom_"){
    alert("Digite um nome válido para a categoria.");
    return;
  }

  const reservadas = Object.keys(NOMES_CATEGORIAS_PADRAO);

  if(reservadas.includes(chave) || categoriasLaterais.some(c => c.chave === chave)){
    alert("Já existe uma categoria com esse nome.");
    return;
  }

  const maiorOrdem = categoriasLaterais.reduce((max, cat) => Math.max(max, Number(cat.ordem || 0)), 0);

  const { error } = await db.from("categorias_laterais").insert({
    chave,
    nome,
    sistema: false,
    ordem: maiorOrdem + 1,
    visivel: true
  });

  if(error){
    alert("Erro ao criar categoria. Confira se a tabela categorias_laterais foi criada no Supabase.");
    return;
  }

  await criarLog(`Categoria lateral criada: ${nome}`);
  novaCategoriaNome.value = "";
  await carregarCategorias();
  aplicarNomesCategorias();
  renderGerenciar();
}

async function excluirCategoriaLateral(chave){
  if(!(await confirmarExclusao())) return;

  const cat = categoriasLaterais.find(c => c.chave === chave);

  const { error } = await db
    .from("categorias_laterais")
    .delete()
    .eq("chave", chave)
    .eq("sistema", false);

  if(error){
    alert(error.message);
    return;
  }

  await criarLog(`Categoria lateral excluída: ${cat ? cat.nome : chave}`);
  await carregarCategorias();

  if(paginaAtual === chave){
    abrir("angels");
    return;
  }

  aplicarNomesCategorias();
  renderGerenciar();
}

function aplicarNomesCategorias(){
  const nomes = pegarNomesCategorias();
  const mapa = {
    menuAngels: nomes.angels,
    menuRecrutamento: nomes.recrutamento,
    menuElite: nomes.elite,
    menuEventos: nomes.eventos,
    menuSorteio: nomes.sorteio,
    menuVirtus: nomes.virtus,
    menuLogs: nomes.logs,
    menuGerenciar: nomes.gerenciar
  };

  Object.entries(mapa).forEach(([id, texto]) => {
    const el = document.getElementById(id);
    if(el) el.textContent = texto;
  });

  const extrasMenu = document.getElementById("categoriasExtrasMenu");
  if(extrasMenu){
    extrasMenu.innerHTML = pegarCategoriasExtras()
      .map(cat => `<button onclick="abrir('${cat.chave}')"><span>${escaparHTML(cat.nome)}</span></button>`)
      .join("");
  }
}

async function salvarNomesCategorias(){
  const atualizados = [
    { chave: "angels", nome: nomeCatAngels.value.trim() || NOMES_CATEGORIAS_PADRAO.angels, sistema: true, ordem: 1, visivel: true },
    { chave: "recrutamento", nome: nomeCatRecrutamento.value.trim() || NOMES_CATEGORIAS_PADRAO.recrutamento, sistema: true, ordem: 2, visivel: true },
    { chave: "elite", nome: nomeCatElite.value.trim() || NOMES_CATEGORIAS_PADRAO.elite, sistema: true, ordem: 3, visivel: true },
    { chave: "eventos", nome: nomeCatEventos.value.trim() || NOMES_CATEGORIAS_PADRAO.eventos, sistema: true, ordem: 4, visivel: true },
    { chave: "sorteio", nome: nomeCatSorteio.value.trim() || NOMES_CATEGORIAS_PADRAO.sorteio, sistema: true, ordem: 5, visivel: true },
    { chave: "virtus", nome: nomeCatVirtus.value.trim() || NOMES_CATEGORIAS_PADRAO.virtus, sistema: true, ordem: 6, visivel: true },
    { chave: "logs", nome: nomeCatLogs.value.trim() || NOMES_CATEGORIAS_PADRAO.logs, sistema: true, ordem: 900, visivel: true },
    { chave: "gerenciar", nome: nomeCatGerenciar.value.trim() || NOMES_CATEGORIAS_PADRAO.gerenciar, sistema: true, ordem: 901, visivel: true }
  ];

  const { error } = await db
    .from("categorias_laterais")
    .upsert(atualizados, { onConflict: "chave" });

  if(error){
    alert("Erro ao salvar nomes. Confira se a tabela categorias_laterais foi criada no Supabase.");
    return;
  }

  await criarLog("Nomes das categorias laterais atualizados");
  await carregarCategorias();
  aplicarNomesCategorias();
  alert("Nomes das categorias salvos.");
  renderGerenciar();
}


async function carregarConfig(){
  if(!categoriasLaterais.length){
    await carregarCategorias();
  }

  const { data } = await db
    .from("configuracoes")
    .select("*")
    .eq("id", 1)
    .single();

  config = data || {};
  configCarregada = true;
  aplicarNomesCategorias();

  if(config.fundo){
    document.body.style.backgroundImage = `url(${config.fundo})`;
    document.body.style.backgroundSize = "cover";
    document.body.style.backgroundAttachment = "fixed";
  }
}


async function criarLog(acao){
  await db.from("logs").insert({
    usuario: usuarioAtual ? usuarioAtual.usuario : "sistema",
    acao
  });
}


function mostrarLogin(){
  loginArea.classList.remove("hidden");
  cadastroArea.classList.add("hidden");
  tabLogin.classList.add("ativo");
  tabCadastro.classList.remove("ativo");
}


function mostrarCadastro(){
  loginArea.classList.add("hidden");
  cadastroArea.classList.remove("hidden");
  tabLogin.classList.remove("ativo");
  tabCadastro.classList.add("ativo");
}


async function cadastrar(){
  const usuario = cadUser.value.trim();
  const game_id = cadID.value.trim();
  const senha = cadSenha.value.trim();

  if(!usuario || !game_id || !senha){
    alert("Preencha usuário, ID e senha.");
    return;
  }

  const existe = await db
    .from("usuarios")
    .select("*")
    .eq("usuario", usuario);

  if(existe.data && existe.data.length > 0){
    alert("Esse usuário já existe.");
    return;
  }

  const { error } = await db.from("usuarios").insert({
    usuario,
    senha,
    game_id,
    cargo: "membro",
    aprovado: false
  });

  if(error){
    alert(error.message);
    return;
  }

  usuarioAtual = { usuario: "sistema" };
  await criarLog(`Solicitação de cadastro enviada: ${usuario} | ID: ${game_id}`);
  usuarioAtual = null;

  alert("Cadastro enviado! Aguarde aprovação do administrador.");

  cadUser.value = "";
  cadID.value = "";
  cadSenha.value = "";

  mostrarLogin();
}

function mostrarSiteLogado(){
  loginPage.classList.add("hidden");
  site.classList.remove("hidden");
  if(topLogoutBtn) topLogoutBtn.classList.remove("hidden");

  if(usuarioAtual && usuarioAtual.cargo === "admin"){
    btnLogs.classList.remove("hidden");
    btnGerenciar.classList.remove("hidden");
  }else{
    btnLogs.classList.add("hidden");
    btnGerenciar.classList.add("hidden");
  }
}

function salvarSessao(){
  if(usuarioAtual){
    localStorage.setItem("nextage_usuario_logado", JSON.stringify(usuarioAtual));
  }
}

function limparSessao(){
  localStorage.removeItem("nextage_usuario_logado");
}


async function login(){
  const usuario = loginUser.value.trim();
  const senha = loginSenha.value.trim();

  const { data, error } = await db
    .from("usuarios")
    .select("*")
    .eq("usuario", usuario)
    .eq("senha", senha)
    .single();

  if(error || !data){
    alert("Usuário ou senha inválidos.");
    return;
  }

  if(!data.aprovado){
    alert("Esse cadastro ainda não foi aprovado.");
    return;
  }

  usuarioAtual = data;
  salvarSessao();
  mostrarSiteLogado();

  await criarLog(`Login realizado: ${usuarioAtual.usuario}`);

  abrir("angels");
}


async function sair(){
  if(usuarioAtual){
    await criarLog(`Logout realizado: ${usuarioAtual.usuario}`);
  }

  usuarioAtual = null;
  limparSessao();

  site.classList.add("hidden");
  loginPage.classList.remove("hidden");
  if(topLogoutBtn) topLogoutBtn.classList.add("hidden");
}


async function abrir(pagina){
  paginaAtual = pagina;
  localStorage.setItem("nextage_ultima_pagina", pagina);
  const token = ++navegacaoToken;

  aplicarNomesCategorias();

  if(!configCarregada){
    await carregarConfig();
    if(token !== navegacaoToken) return;
  }

  content.innerHTML = `<div class="loadingPage">Carregando...</div>`;

  if(pagina === "angels") return renderPosts("angels", nomeCategoria("angels"), true);
  if(pagina === "eventos") return renderPosts("eventos", nomeCategoria("eventos"), false);
  if(pagina === "virtus") return renderVirtus();

  if(pagina === "elite") return renderElite();
  if(pagina === "sorteio") return renderSorteio();
  if(pagina === "logs") return renderLogs();

  const categoriaExtra = pegarCategoriasExtras().find(cat => cat.chave === pagina);
  if(categoriaExtra) return renderPosts(categoriaExtra.chave, categoriaExtra.nome, false);
}

function escaparHTML(texto){
  return String(texto || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}


function formatarTexto(texto){
  let seguro = escaparHTML(texto);

  seguro = seguro
    .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
    .replace(/__(.*?)__/g, "<b>$1</b>")
    .replace(/\*(.*?)\*/g, "<i>$1</i>")
    .replace(/_(.*?)_/g, "<i>$1</i>")
    .replace(/`(.*?)`/g, "<code>$1</code>");

  return seguro.replace(/\n/g, "<br>");
}


function uploadBox(id){
  return `
    <div id="${id}" class="uploadStatus">
      <div class="progressBar">
        <div class="progressFill"></div>
      </div>
      <div class="progressText">Preparando anexo...</div>
    </div>
  `;
}


function atualizarUpload(id, porcentagem, texto){
  const box = document.getElementById(id);
  if(!box) return;

  box.classList.add("ativo");

  const fill = box.querySelector(".progressFill");
  const label = box.querySelector(".progressText");

  if(fill) fill.style.width = `${porcentagem}%`;
  if(label) label.textContent = texto || `${porcentagem}% carregado`;
}


function esconderUpload(id){
  const box = document.getElementById(id);
  if(!box) return;

  setTimeout(() => {
    box.classList.remove("ativo");
    const fill = box.querySelector(".progressFill");
    const label = box.querySelector(".progressText");

    if(fill) fill.style.width = "0%";
    if(label) label.textContent = "Preparando anexo...";
  }, 700);
}


function renderMidia(midia, tipo){
  if(!midia) return "";

  if(tipo && tipo.startsWith("video")){
    return `<video src="${midia}" controls></video>`;
  }

  return `<img src="${midia}">`;
}



function nomeArquivoSeguro(nome){
  return String(nome || "arquivo")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-zA-Z0-9._-]/g, "_");
}

async function uploadArquivo(file, progressoId = null, pasta = "posts"){
  if(!file){
    return { midia: null, tipo: null };
  }

  if(progressoId){
    atualizarUpload(progressoId, 10, "Preparando anexo...");
  }

  const caminho = `${pasta}/${Date.now()}_${Math.random().toString(36).slice(2)}_${nomeArquivoSeguro(file.name)}`;

  try{
    if(progressoId){
      atualizarUpload(progressoId, 45, "Enviando anexo...");
    }

    const { error } = await db.storage
      .from(STORAGE_BUCKET)
      .upload(caminho, file, {
        cacheControl: "3600",
        upsert: false,
        contentType: file.type || "application/octet-stream"
      });

    if(error){
      throw error;
    }

    const { data } = db.storage
      .from(STORAGE_BUCKET)
      .getPublicUrl(caminho);

    if(progressoId){
      atualizarUpload(progressoId, 100, "Anexo enviado.");
    }

    return {
      midia: data.publicUrl,
      tipo: file.type
    };
  }catch(e){
    console.warn("Falha no Supabase Storage. Usando Base64 como reserva:", e);
    if(progressoId){
      atualizarUpload(progressoId, 55, "Storage indisponível. Salvando em modo compatível...");
    }
    return arquivoParaBase64(file, progressoId);
  }
}

function arquivoParaBase64(file, progressoId = null){
  return new Promise((resolve, reject) => {
    if(!file){
      resolve({ midia: null, tipo: null });
      return;
    }

    const reader = new FileReader();

    if(progressoId){
      atualizarUpload(progressoId, 0, "Preparando anexo...");
    }

    reader.onprogress = function(e){
      if(e.lengthComputable && progressoId){
        const porcentagem = Math.round((e.loaded / e.total) * 100);
        atualizarUpload(progressoId, porcentagem, `${porcentagem}% carregado`);
      }
    };

    reader.onload = function(e){
      if(progressoId){
        atualizarUpload(progressoId, 100, "Anexo carregado. Enviando...");
      }

      resolve({
        midia: e.target.result,
        tipo: file.type
      });
    };

    reader.onerror = function(){
      reject(new Error("Erro ao carregar o anexo."));
    };

    reader.readAsDataURL(file);
  });
}

async function criarPost(categoria){
  const texto = postTexto.value.trim();
  const file = postArquivo.files[0];

  if(!texto && !file){
    alert("Adicione texto ou mídia.");
    return;
  }

  if(typeof btnPublicarPost !== "undefined") btnPublicarPost.disabled = true;

  let arquivo;

  try{
    arquivo = await uploadArquivo(file, "uploadPost", categoria);
  }catch(e){
    alert(e.message);
    if(typeof btnPublicarPost !== "undefined") btnPublicarPost.disabled = false;
    esconderUpload("uploadPost");
    return;
  }

  const { error } = await db.from("posts").insert({
    categoria,
    usuario: usuarioAtual.usuario,
    texto,
    midia: arquivo.midia,
    tipo_midia: arquivo.tipo
  });

  if(error){
    alert(error.message);
    if(typeof btnPublicarPost !== "undefined") btnPublicarPost.disabled = false;
    esconderUpload("uploadPost");
    return;
  }

  await criarLog(`Postagem criada em ${categoria}`);
  esconderUpload("uploadPost");
  abrir(categoria);
}

    const jaParticipa = lista.some(p => p.usuario === usuarioAtual.usuario);

    html += `
      <div class="card post">

        <p class="formattedText">${formatarTexto(sorteio.texto)}</p>

        ${renderMidia(sorteio.midia, sorteio.tipo_midia)}

        <br><br>

        <button 
          onclick="participarSorteio(${sorteio.id})"
          ${jaParticipa ? "disabled" : ""}>
          ${jaParticipa ? "VOCÊ JÁ PARTICIPA" : "PARTICIPAR DO SORTEIO"}
        </button>

        <h2>PARTICIPANTES (${lista.length})</h2>

        ${lista.length ? lista.map(p => `<p>${p.usuario}</p>`).join("") : "<p>Nenhum participante ainda.</p>"}

        ${usuarioAtual.cargo === "admin" ? `
          <br>
          <button onclick="gerarSorteio(${sorteio.id})">GERAR SORTEIO</button>
          <button class="delete" onclick="excluirSorteio(${sorteio.id})">Excluir sorteio</button>
        ` : ""}

        ${sorteio.vencedor ? `<h2>Vencedor: 👑 ${sorteio.vencedor}</h2>` : ""}

      </div>
    `;
  }

  html += rodapeLinks();

  content.innerHTML = html;
}


async function criarSorteio(){
  const texto = sorteioTexto.value.trim();
  const file = sorteioArquivo.files[0];

  if(!texto && !file){
    alert("Adicione texto ou mídia ao sorteio.");
    return;
  }

  if(typeof btnCriarSorteio !== "undefined") btnCriarSorteio.disabled = true;

  let arquivo;

  try{
    arquivo = await uploadArquivo(file, "uploadSorteio", "sorteios");
  }catch(e){
    alert(e.message);
    if(typeof btnCriarSorteio !== "undefined") btnCriarSorteio.disabled = false;
    esconderUpload("uploadSorteio");
    return;
  }

  const { error } = await db.from("sorteios").insert({
    texto,
    midia: arquivo.midia,
    tipo_midia: arquivo.tipo,
    vencedor: null
  });

  if(error){
    alert(error.message);
    if(typeof btnCriarSorteio !== "undefined") btnCriarSorteio.disabled = false;
    esconderUpload("uploadSorteio");
    return;
  }

  await criarLog("Sorteio criado");
  esconderUpload("uploadSorteio");
  renderSorteio();
}


async function participarSorteio(id){
  const { error } = await db.from("participantes_sorteio").insert({
    sorteio_id: id,
    usuario: usuarioAtual.usuario
  });

  if(error){
    alert("Você já está participando desse sorteio.");
    return;
  }

  await criarLog(`${usuarioAtual.usuario} participou do sorteio`);
  renderSorteio();
}


async function gerarSorteio(id){
  if(usuarioAtual.cargo !== "admin"){
    alert("Apenas o administrador pode gerar o sorteio.");
    return;
  }

  const participantes = await db
    .from("participantes_sorteio")
    .select("*")
    .eq("sorteio_id", id);

  const lista = participantes.data || [];

  if(lista.length === 0){
    alert("Não há participantes.");
    return;
  }

  const vencedor = lista[Math.floor(Math.random() * lista.length)].usuario;

  const { error } = await db
    .from("sorteios")
    .update({ vencedor })
    .eq("id", id);

  if(error){
    alert(error.message);
    return;
  }

  await criarLog(`Sorteio gerado. Vencedor: ${vencedor}`);
  renderSorteio();
}


async function excluirSorteio(id){
  if(!(await confirmarExclusao())) return;

  await db
    .from("participantes_sorteio")
    .delete()
    .eq("sorteio_id", id);

  const { error } = await db
    .from("sorteios")
    .delete()
    .eq("id", id);

  if(error){
    alert(error.message);
    return;
  }

  await criarLog("Sorteio excluído");
  renderSorteio();
}
async function renderLogs(){
  if(usuarioAtual.cargo !== "admin"){
    content.innerHTML = "<h1>Acesso negado</h1>";
    return;
  }

  const { data } = await db
    .from("logs")
    .select("*")
    .order("criado_em", { ascending: false });

  let html = `
    <h1>${nomeCategoria("logs")}</h1>

    <div class="card logs">
  `;

  if(!data || data.length === 0){
    html += `<p>Nenhum log ainda.</p>`;
  }

  data.forEach(log => {
    html += `
      <p>
        <b>${new Date(log.criado_em).toLocaleString("pt-BR")}</b>
        —
        ${log.usuario}: ${log.acao}
      </p>
    `;
  });

  html += `</div>`;

  content.innerHTML = html;
}

  html += `
    </div>

    <div class="card">
      <h2>Membros Gestão</h2>
  `;

  const gestao = (aprovados.data || []).filter(u => u.cargo === "admin" || u.cargo === "virtus" || u.cargo === "elite");

  if(!gestao.length){
    html += `<p>Nenhum perfil de gestão cadastrado.</p>`;
  }

  gestao.forEach(u => {
    const isAdmin = u.cargo === "admin";
    html += `
      <div class="memberRow">
        <div>
          <b>${escaparHTML(u.usuario)}</b> — ID: ${escaparHTML(u.game_id)} — ${escaparHTML(u.cargo)}
        </div>
        <div class="memberActions">
          <button class="smallBtn" onclick="alterarSenhaUsuario('${u.id}', '${escaparHTML(u.usuario)}')">Alterar senha</button>
          ${!isAdmin ? `<button class="delete smallBtn" onclick="excluirUsuarioAprovado('${u.id}', '${escaparHTML(u.usuario)}')">🗑️</button>` : ""}
        </div>
      </div>
    `;
  });

  html += `
      <div class="dividerLine"></div>
      <h2>CRIAR PERFIL GESTÃO</h2>
      <div class="gestaoFormGrid">
        <input id="gestaoUsuario" placeholder="Usuário">
        <input id="gestaoID" placeholder="ID">
        <input id="gestaoSenha" type="password" placeholder="Senha">
        <select id="gestaoCargo">
          <option value="virtus">Gestão VIRTUS RP</option>
          <option value="elite">Gestão ELITE LEGACY</option>
        </select>
      </div>
      <button onclick="criarPerfilGestao()">Criar perfil gestão</button>
    </div>

    <div class="card">
      <h2>Membros aprovados</h2>
  `;

  const membrosComuns = (aprovados.data || []).filter(u => u.cargo !== "admin" && u.cargo !== "virtus" && u.cargo !== "elite");

  if(!membrosComuns.length){
    html += `<p>Nenhum membro comum aprovado.</p>`;
  }

  membrosComuns.forEach(u => {
    html += `
      <div class="memberRow">
        <div>
          <b>${escaparHTML(u.usuario)}</b> — ID: ${escaparHTML(u.game_id)} — ${escaparHTML(u.cargo)}
        </div>
        <div class="memberActions">
          <button class="smallBtn" onclick="alterarSenhaUsuario('${u.id}', '${escaparHTML(u.usuario)}')">Alterar senha</button>
          <button class="delete smallBtn" onclick="excluirUsuarioAprovado('${u.id}', '${escaparHTML(u.usuario)}')">🗑️</button>
        </div>
      </div>
    `;
  });

  html += `
    </div>

    <div class="card">
      <h2>Editar nomes das categorias laterais</h2>

      <input id="nomeCatAngels" placeholder="Categoria principal" value="${nomeCategoria("angels")}">
      <input id="nomeCatRecrutamento" placeholder="Recrutamento" value="${nomeCategoria("recrutamento")}">
      <input id="nomeCatElite" placeholder="Elite" value="${nomeCategoria("elite")}">
      <input id="nomeCatEventos" placeholder="Eventos" value="${nomeCategoria("eventos")}">
      <input id="nomeCatSorteio" placeholder="Sorteio" value="${nomeCategoria("sorteio")}">
      <input id="nomeCatVirtus" placeholder="Virtus RP" value="${nomeCategoria("virtus")}">
      <input id="nomeCatLogs" placeholder="Logs" value="${nomeCategoria("logs")}">
      <input id="nomeCatGerenciar" placeholder="Gerenciar" value="${nomeCategoria("gerenciar")}">

      <button onclick="salvarNomesCategorias()">Salvar nomes das categorias</button>
    </div>

    <div class="card">
      <h2>Adicionar categoria na lateral</h2>
      <p class="logs">Toda categoria criada aqui funciona igual a categoria NEXTAGE: abre uma página com postagens, texto e anexos.</p>
      <input id="novaCategoriaNome" placeholder="Nome da nova categoria">
      <button onclick="adicionarCategoriaLateral()">Adicionar categoria</button>

      <h2 style="margin-top:25px;">Categorias criadas</h2>
      ${pegarCategoriasExtras().length ? pegarCategoriasExtras().map(cat => `
        <div class="categoryEditRow">
          <input value="${escaparHTML(cat.nome)}" readonly>
          <button class="delete" title="Excluir categoria" onclick="excluirCategoriaLateral('${cat.chave}')">🗑️</button>
        </div>
      `).join("") : "<p>Nenhuma categoria extra criada ainda.</p>"}
    </div>

    <div class="card">
      <h2>LINKS</h2>

      <input id="linkDiscord" placeholder="Discord" value="${config.discord || ""}">
      <input id="linkInstagram" placeholder="Instagram" value="${config.instagram || ""}">
      <input id="linkYoutube" placeholder="Youtube" value="${config.youtube || ""}">
      <input id="linkTiktok" placeholder="TikTok" value="${config.tiktok || ""}">
      <input id="linkDiscordVirtus" placeholder="Discord VIRTUS RP" value="${config.discord_virtus || ""}">

      <button onclick="salvarLinks()">Salvar links</button>

    <div class="card">
      <h2>Avatar / Capa / Fundo</h2>

      <label>Avatar / Logo</label>
      <input type="file" id="avatarFile" accept="image/png,image/jpg,image/jpeg,image/gif">

      <label>Capa 1672x238</label>
      <input type="file" id="capaFile" accept="image/png,image/jpg,image/jpeg,image/gif">

      <label>Capa Elite Legacy</label>
<input type="file" id="capaEliteFile" accept="image/png,image/jpg,image/jpeg,image/gif">

      <label>Plano de fundo</label>
      <input type="file" id="fundoFile" accept="image/png,image/jpg,image/jpeg,image/gif">

async function criarPerfilGestao(){
  const usuario = gestaoUsuario.value.trim();
  const game_id = gestaoID.value.trim();
  const senha = gestaoSenha.value.trim();
  const cargo = gestaoCargo.value;

  if(!usuario || !game_id || !senha){
    alert("Preencha usuário, ID e senha.");
    return;
  }

  const existe = await db
    .from("usuarios")
    .select("id")
    .eq("usuario", usuario);

  if(existe.data && existe.data.length > 0){
    alert("Esse usuário já existe.");
    return;
  }

  const { error } = await db.from("usuarios").insert({
    usuario,
    senha,
    game_id,
    cargo,
    aprovado: true
  });

  if(error){
    alert(error.message);
    return;
  }

  await criarLog(`Perfil de gestão criado: ${usuario} — ${cargo}`);
  alert("Perfil de gestão criado com sucesso.");
  renderGerenciar();
}


async function aprovarUsuario(id, usuario){
  const { error } = await db
    .from("usuarios")
    .update({ aprovado: true })
    .eq("id", id);

  if(error){
    alert(error.message);
    return;
  }

  await criarLog(`Cadastro aprovado: ${usuario}`);
  renderGerenciar();
}


async function excluirSolicitacao(id, usuario){
  if(!(await confirmarExclusao())) return;

  const { error } = await db
    .from("usuarios")
    .delete()
    .eq("id", id);

  if(error){
    alert(error.message);
    return;
  }

  await criarLog(`Solicitação de cadastro excluída: ${usuario}`);
  renderGerenciar();
}


async function excluirUsuarioAprovado(id, usuario){
  if(!(await confirmarExclusao())) return;

  const { data: alvo } = await db
    .from("usuarios")
    .select("cargo")
    .eq("id", id)
    .single();

  if(alvo && alvo.cargo === "admin"){
    alert("O cadastro administrativo não pode ser excluído.");
    return;
  }

  const { error } = await db
    .from("usuarios")
    .delete()
    .eq("id", id);

  if(error){
    alert(error.message);
    return;
  }

  await criarLog(`Cadastro excluído: ${usuario}`);
  renderGerenciar();
}

async function alterarSenhaUsuario(id, usuario){
  const novaSenha = prompt(`Digite a nova senha para ${usuario}:`);

  if(novaSenha === null) return;

  const senhaLimpa = novaSenha.trim();

  if(!senhaLimpa){
    alert("Digite uma senha válida.");
    return;
  }

  const { error } = await db
    .from("usuarios")
    .update({ senha: senhaLimpa })
    .eq("id", id);

  if(error){
    alert(error.message);
    return;
  }

  await criarLog(`Senha alterada para: ${usuario}`);
  alert("Senha alterada com sucesso.");
  renderGerenciar();
}


async function salvarLinks(){
  const { error } = await db
    .from("configuracoes")
    .update({
  discord: linkDiscord.value.trim(),
  discord_virtus: linkDiscordVirtus.value.trim(),
  instagram: linkInstagram.value.trim(),
  youtube: linkYoutube.value.trim(),
  tiktok: linkTiktok.value.trim()
})
    .eq("id", 1);

  if(error){
    alert(error.message);
    return;
  }

  await criarLog("Links atualizados");
  await carregarConfig();

  alert("Links salvos!");
  renderGerenciar();
}


async function salvarImagens(){
  const avatar = avatarFile.files[0] ? await uploadArquivo(avatarFile.files[0], null, "config") : null;
  const capa = capaFile.files[0] ? await uploadArquivo(capaFile.files[0], null, "config") : null;
  const capaElite = capaEliteFile.files[0] ? await uploadArquivo(capaEliteFile.files[0], null, "config") : null;
  const fundo = fundoFile.files[0] ? await uploadArquivo(fundoFile.files[0], null, "config") : null;

  const atualizacao = {};

  if(avatar) atualizacao.avatar = avatar.midia;
  if(capa) atualizacao.capa = capa.midia;
  if(capaElite) atualizacao.capa_elite = capaElite.midia;
  if(fundo) atualizacao.fundo = fundo.midia;

  if(Object.keys(atualizacao).length === 0){
    alert("Escolha pelo menos uma imagem.");
    return;
  }

  const { error } = await db
    .from("configuracoes")
    .update(atualizacao)
    .eq("id", 1);

  if(error){
    alert(error.message);
    return;
  }

  await criarLog("Imagens do site atualizadas");
  await carregarConfig();

  alert("Imagens salvas!");
  renderGerenciar();
}


async function iniciar(){
  aplicarNomesCategorias();
  await carregarConfig();

  try{
    const sessao = JSON.parse(localStorage.getItem("nextage_usuario_logado") || "null");
    if(sessao && sessao.usuario){
      const { data } = await db
        .from("usuarios")
        .select("*")
        .eq("id", sessao.id)
        .eq("aprovado", true)
        .single();

      if(data){
        usuarioAtual = data;
        salvarSessao();
        mostrarSiteLogado();
        abrir(localStorage.getItem("nextage_ultima_pagina") || "angels");
      }else{
        limparSessao();
      }
    }
  }catch(e){
    limparSessao();
  }
}


iniciar();

</script>
